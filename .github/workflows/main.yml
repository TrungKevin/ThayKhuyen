name: CI/CD Food Rescue

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build with Maven
      run: cd nguyentrungkien/nguyentrungkien/pom.xml clean package -DskipTests

    - name: Check files
      run: ls -R

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      run: |
        cd nguyentrungkien/nguyentrungkien
        docker build -t ntkienn/food-rescue:latest .
        docker push ntkienn/food-rescue:latest
